<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>본인인증 | 도토리마켓</title>
    <link rel="stylesheet" href="/ehr/resources/register/register.css" />
  </head>
  <body>
    <div class="formbox">
      <h1>인증번호를 입력해주세요</h1>
      <form class="form" action="/ehr/resources/login/login.html">
        <div class="inputbox">
          <label for="umail"></label>
          <input
            type="text"
            id="umail"
            autofocus
            placeholder="인증번호"
            required
          />
        </div>
        <button type="submit" class="button">다음</button>
      </form>
    </div>
  </body>
</html>
